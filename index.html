<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Üniversite Öğrenci Asistanı</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- iPhone tam ekran -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Öğrenci Asistanı" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Öğrenci Asistanı</h1>
  </header>

  <nav class="tabs">
    <button class="tab-button active" data-tab="courses">Dersler</button>
    <button class="tab-button" data-tab="gpa">Ortalama</button>
    <button class="tab-button" data-tab="schedule">Zamanlayıcı</button>
  </nav>

  <main>
    <!-- DERSLER -->
    <section id="courses" class="tab active">
      <div class="courses-layout">
        <aside class="courses-sidebar card">
          <div class="sidebar-header">
            <h2>Dersler</h2>
            <button id="add-course-btn" class="small-accent-btn">+ Ders</button>
          </div>
          <div id="course-list" class="course-list"></div>
        </aside>

        <section class="course-detail card" id="course-detail">
          <div id="no-course-selected">
            <p style="color:#9ca3af;font-size:14px;">
              Soldan bir ders seç veya yeni ders ekle.
            </p>
          </div>

          <div id="course-content" class="hidden">
            <h2 id="course-title"></h2>

            <div class="detail-section">
              <h3>Notlar / Eksikler</h3>
              <textarea id="course-notes" rows="6" placeholder="Bu derste eksik olduğun konuları, özetleri, önemli noktaları buraya yaz."></textarea>
              <button id="save-notes-btn" class="small-accent-btn">Notları Kaydet</button>
            </div>

            <div class="detail-section">
              <div class="detail-header">
                <h3>Dosyalar / Kaynaklar</h3>
                <button id="add-resource-btn" class="small-accent-btn">+ Kaynak</button>
              </div>
              <p class="muted-text" style="margin-top:-4px;margin-bottom:8px;">
                Buraya dosyaların için link ekleyebilirsin (Google Drive, pdf linki, ders portalı vs.).
              </p>
              <div id="resource-list" class="list"></div>
            </div>
          </div>
        </section>
      </div>
    </section>

    <!-- ORTALAMA HESAPLAMA -->
    <section id="gpa" class="tab">
      <h2>Ortalama Hesaplama</h2>
      <div class="card">
        <div class="gpa-row">
          <label>
            Sınıf:
            <select id="gpa-year">
              <option value="1">1. sınıf</option>
              <option value="2">2. sınıf</option>
              <option value="3">3. sınıf</option>
              <option value="4">4. sınıf</option>
            </select>
          </label>
          <label>
            Dönem:
            <select id="gpa-term">
              <option value="guz">Güz</option>
              <option value="bahar">Bahar</option>
            </select>
          </label>
        </div>

        <form id="gpa-course-form" class="gpa-course-form">
          <label>
            Ders adı:
            <input type="text" id="gpa-course-name" required />
          </label>
          <label>
            Kredi:
            <input type="number" id="gpa-course-credit" min="0" step="0.5" required />
          </label>
          <label>
            Not:
            <select id="gpa-course-grade" required>
              <option value="AA">AA (4.0)</option>
              <option value="BA">BA (3.5)</option>
              <option value="BB">BB (3.0)</option>
              <option value="CB">CB (2.5)</option>
              <option value="CC">CC (2.0)</option>
              <option value="DC">DC (1.5)</option>
              <option value="DD">DD (1.0)</option>
              <option value="FF">FF (0.0)</option>
            </select>
          </label>
          <button type="submit" class="small-accent-btn">Ders Ekle</button>
        </form>

        <div id="gpa-courses-list" class="list"></div>

        <div class="gpa-summary">
          <div>
            <span class="muted-text">Seçili dönem ortalaması</span>
            <div id="term-gpa" class="gpa-value">-</div>
          </div>
          <div>
            <span class="muted-text">Genel (kümülatif) ortalama</span>
            <div id="cumulative-gpa" class="gpa-value">-</div>
          </div>
        </div>
      </div>
    </section>

    <!-- ZAMANLAYICI -->
    <section id="schedule" class="tab">
      <h2>Ders Zamanlayıcı</h2>
      <div class="card">
        <form id="schedule-form" class="gpa-course-form">
          <label>
            Ders:
            <input type="text" id="schedule-course" required />
          </label>
          <label>
            Gün:
            <select id="schedule-day" required>
              <option value="Pazartesi">Pazartesi</option>
              <option value="Salı">Salı</option>
              <option value="Çarşamba">Çarşamba</option>
              <option value="Perşembe">Perşembe</option>
              <option value="Cuma">Cuma</option>
              <option value="Cumartesi">Cumartesi</option>
              <option value="Pazar">Pazar</option>
            </select>
          </label>
          <label>
            Saat:
            <input type="time" id="schedule-time" required />
          </label>
          <button type="submit" class="small-accent-btn">Ekle</button>
        </form>

        <div id="schedule-list" class="list"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
